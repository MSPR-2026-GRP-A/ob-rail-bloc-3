scrape_configs:
  - job_name: "backend"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["backend:8000"]

  - job_name: "cadvisor"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "loki"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["loki:3100"]